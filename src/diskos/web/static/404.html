<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DISKOS Explorer</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #008080;
      font-family: "MS Sans Serif", Tahoma, Geneva, Verdana, sans-serif; font-size: 13px; color: #000; }
    .w { width: 380px; background: #c0c0c0; padding: 3px;
      box-shadow: inset -1px -1px #0a0a0a, inset 1px 1px #fff, inset -2px -2px #808080, inset 2px 2px #dfdfdf; }
    .t { background: linear-gradient(90deg,#000080,#1084d0); color:#fff; font-weight:bold; padding:3px 6px; margin:2px; }
    .b { padding: 18px 20px; }
    .b p { margin: 0 0 12px; }
    a { display:inline-block; text-decoration:none; color:#000; background:#c0c0c0; padding:5px 14px; margin-top:6px;
      box-shadow: inset -1px -1px #0a0a0a, inset 1px 1px #fff, inset -2px -2px #808080, inset 2px 2px #dfdfdf; }
    a:active { box-shadow: inset 1px 1px #0a0a0a, inset -1px -1px #fff, inset 2px 2px #808080, inset -2px -2px #dfdfdf; }
  </style>
</head>
<body>
  <div class="w">
    <div class="t">DISKOS Explorer</div>
    <div class="b">
      <p><b>This page isn't here.</b></p>
      <p>The app may still be deploying, or the address is wrong.</p>
      <a href="/diskos-explorer/">Go to DISKOS Explorer</a>
    </div>
  </div>
</body>
</html>
