name: Deploy front-end to Pages

# Publishes the static SPA to GitHub Pages, served at johnspace.xyz/diskos-explorer/
# (project page under the user page's custom domain). The build injects the base
# path and the API host into the HTML so the SPA calls the FastAPI backend on
# lambda-scalar via api.johnspace.xyz/diskos.
on:
  push:
    branches: [main]
    paths:
      - "src/diskos/web/static/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  BASE_PATH: /diskos-explorer/
  API_BASE: https://api.johnspace.xyz/diskos

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Build static bundle
        run: |
          mkdir -p _site/static
          src=src/diskos/web/static
          cp "$src/index.html" _site/index.html
          cp "$src/404.html" _site/404.html
          cp "$src/styles.css" "$src/app.js" _site/static/
          sed -i "s#__BASE__#${BASE_PATH}#g; s#__API_BASE__#${API_BASE}#g" _site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
