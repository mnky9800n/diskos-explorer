name: Deploy

# On merge to main, the self-hosted runner on homebase rebuilds and restarts the
# container. No inbound ports: the runner polls GitHub and sits on your tailnet.
on:
  push:
    branches: [main]

# Never run two deploys at once.
concurrency:
  group: deploy-homebase
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, homebase]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker compose build
      - name: Restart service
        run: docker compose up -d
      - name: Prune dangling images
        run: docker image prune -f
