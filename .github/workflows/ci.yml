name: CI

# Run the test suite on every PR and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync deps
        run: uv sync
      - name: Run tests
        run: uv run pytest -q
