# diskosAI configuration. Committed to git: paths and model/compute PROFILES only.
# Never put secrets here. API keys are referenced by environment-variable name
# (api_key_env) and live in a gitignored .env (see .env.example).

[paths]
# Canonical data root on lambda-scalar (SSH-only, immutable). Used when running
# on lambda-scalar directly.
diskos_root = "//lambda-scalar/home/mnky9800n/data/DISKOS"
# A small rsync'd subset for laptop dev (see README for the rsync recipe).
local_sample = "./data/DISKOS"
# Which root to use: "diskos_root" (run on lambda-scalar) or "local_sample" (laptop).
prefer = "diskos_root"
# Persistent human same/different calls on similar taxon names (relative to repo root).
taxon_decisions = "taxon_decisions.csv"
# Cached Sodir/NPD FactPages wellbore CSVs (gitignored; populated by `diskos npd fetch`).
npd_dir = "./data/npd"
# Cached OCR transcripts of scanned reports (gitignored; populated by `diskos ocr`).
ocr_dir = "./data/ocr"

[llm]
# Cheap, always-on local model unless a caller explicitly asks for another profile.
default_profile = "jack-serve"

# --- Model/compute profiles. All go through one OpenAI-compatible client. ---

[llm.profiles.jack-serve]
# lambda-scalar Ollama: always-on, unmetered, data stays local. Serves Jack.
base_url = "http://localhost:11434/v1"
model = "qwen2.5:32b"
api_key_env = "OLLAMA_API_KEY"

[llm.profiles.wiki-well]
# Per-borehole wiki pages (~2362 of them). Fast, structured, already loaded local.
base_url = "http://localhost:11434/v1"
model = "qwen2.5:32b"
api_key_env = "OLLAMA_API_KEY"

[llm.profiles.wiki-field]
# Field-level pages: cross-well synthesis where quality pays off. Local, free.
base_url = "http://localhost:11434/v1"
model = "llama3.3:70b"
api_key_env = "OLLAMA_API_KEY"

[llm.profiles.vision]
# Scanned-report OCR + microscope-image triage. Uses a small-context variant of
# qwen2.5vl (create once on the Ollama host:
#   printf 'FROM qwen2.5vl:7b\nPARAMETER num_ctx 8192\n' | ollama create qwen2.5vl-ocr -f -
# ) because the stock 128k context inflates the 7B model to ~50GB and spills it
# entirely to CPU; an 8k context keeps it ~6GB and fully on the GPU.
base_url = "http://localhost:11434/v1"
model = "qwen2.5vl-ocr"
api_key_env = "OLLAMA_API_KEY"

[llm.profiles.modal]
# On-demand GPU for bursty heavy jobs (bulk vision, XRF batch). ~$500 credit.
base_url = "https://REPLACE-modal-app.modal.run/v1"
model = "REPLACE-hosted-model"
api_key_env = "MODAL_API_KEY"

[llm.profiles.wiki-author]
# Stronger cloud model for high-quality wiki synthesis during build-out.
# Enforce the no-em-dash house style via this profile's system prompt.
base_url = "https://REPLACE-anthropic-openai-gateway/v1"
model = "claude-sonnet-5"
api_key_env = "WIKI_AUTHOR_API_KEY"
